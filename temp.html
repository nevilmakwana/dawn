  /**
   * Identifies account-related URLs that must be gated until KwikPass scripts load.
   */
  function isAccountPath(pathname) {
    if (!pathname) return false;
    return (
      pathname === '/account' ||
      pathname.startsWith('/account/login') ||
      pathname.startsWith('/account/register') ||
      pathname.endsWith('/account') ||
      pathname.indexOf('customer_authentication') !== -1 ||
      pathname === '/account/addresses'
    );
  }

  /**
   * KwikpassAccountGate
   * -------------------
   * Blocks navigation to account pages (see isAccountPath) until every required
   * KwikPass script has loaded successfully.
   *
   * Design notes:
   * - A SINGLE delegated click listener is attached on `document` in the CAPTURE
   *   phase. This means it runs before any bubbling / inline `onclick` handlers,
   *   so navigation is reliably blocked even for links clicked before scripts
   *   finish loading (the race condition we care about). No per-anchor listeners.
   * - A MutationObserver only manages the visual `kwikpass-loading` class on
   *   dynamically injected account links; the actual click-blocking never depends
   *   on the observer, so newly added links are protected immediately by delegation.
   * - Loading state is centralized: every registered script key must flip to true
   *   before the gate lifts. If ANY script fails, the gate stays locked.
   */
  var KwikpassAccountGate = (function () {
    var LOADING_CLASS = 'kwikpass-loading';
    var STYLE_ID = 'kwikpass-gate-style';

    var scriptStatus = Object.create(null); // key -> true once that script loads
    var requiredScripts = [];
    var failed = false;        // a required script errored -> stay locked
    var unlocked = false;      // gate lifted; navigation allowed
    var observer = null;
    var clickListenerAttached = false;

    // Resolve an anchor's pathname tolerantly (handles relative/absolute hrefs).
    function getAnchorPath(anchor) {
      try {
        return anchor.pathname || new URL(anchor.href, window.location.origin).pathname;
      } catch (e) {
        return null;
      }
    }

    function isAccountAnchor(anchor) {
      if (!anchor || anchor.tagName !== 'A') return false;
      var href = anchor.getAttribute('href');
      // Ignore non-navigational hrefs (in-page anchors, javascript: handlers).
      if (!href || href.indexOf('javascript:') === 0 || href.charAt(0) === '#') return false;
      return isAccountPath(getAnchorPath(anchor));
    }

    // Single delegated capture-phase handler: blocks account-link navigation
    // while the gate is locked.
    function onDocumentClick(event) {
      if (unlocked) return;
      var target = event.target;
      var anchor = target && target.closest ? target.closest('a[href]') : null;
      if (!anchor || !isAccountAnchor(anchor)) return;
      event.preventDefault();
      event.stopPropagation();
    }

    // Add/remove the visual loading class on every current account anchor.
    function refreshAnchorClasses() {
      var anchors = document.querySelectorAll('a[href]');
      for (var i = 0; i < anchors.length; i++) {
        if (!isAccountAnchor(anchors[i])) continue;
        if (unlocked) anchors[i].classList.remove(LOADING_CLASS);
        else anchors[i].classList.add(LOADING_CLASS);
      }
    }

    function injectStyle() {
      if (document.getElementById(STYLE_ID)) return;
      var style = document.createElement('style');
      style.id = STYLE_ID;
      // Visual cue only; click-blocking is handled by the delegated listener.
      style.textContent = '.' + LOADING_CLASS + '{cursor:progress;opacity:.7;}';
      (document.head || document.documentElement).appendChild(style);
    }

    // Flag account links inside a freshly added DOM node.
    function flagNode(node) {
      if (node.nodeType !== 1) return; // element nodes only
      if (node.tagName === 'A' && isAccountAnchor(node)) {
        node.classList.add(LOADING_CLASS);
      }
      if (node.querySelectorAll) {
        var inner = node.querySelectorAll('a[href]');
        for (var k = 0; k < inner.length; k++) {
          if (isAccountAnchor(inner[k])) inner[k].classList.add(LOADING_CLASS);
        }
      }
    }

    // Watch for dynamically injected account links (visual class only).
    function startObserver() {
      if (observer || typeof MutationObserver === 'undefined') return;
      observer = new MutationObserver(function (mutations) {
        if (unlocked) return;
        for (var m = 0; m < mutations.length; m++) {
          var added = mutations[m].addedNodes;
          for (var n = 0; n < added.length; n++) flagNode(added[n]);
        }
      });
      observer.observe(document.documentElement, { childList: true, subtree: true });
    }

    function lockNavigation() {
      if (!clickListenerAttached) {
        document.addEventListener('click', onDocumentClick, true); // capture phase
        clickListenerAttached = true;
      }
      injectStyle();
      startObserver();
      // The DOM may still be parsing when scripts are appended.
      if (document.readyState === 'loading') {
        document.addEventListener('DOMContentLoaded', refreshAnchorClasses, { once: true });
      } else {
        refreshAnchorClasses();
      }
    }

    function unlockNavigation() {
      if (unlocked) return;
      unlocked = true;
      if (clickListenerAttached) {
        document.removeEventListener('click', onDocumentClick, true);
        clickListenerAttached = false;
      }
      if (observer) {
        observer.disconnect();
        observer = null;
      }
      refreshAnchorClasses(); // strips the loading class from account links
    }

    function maybeUnlock() {
      if (failed) return;
      for (var i = 0; i < requiredScripts.length; i++) {
        if (!scriptStatus[requiredScripts[i]]) return; // still waiting on a script
      }
      unlockNavigation();
    }

    return {
      // Register every script key up front and begin blocking immediately.
      init: function (keys) {
        requiredScripts = keys.slice();
        for (var i = 0; i < keys.length; i++) scriptStatus[keys[i]] = false;
        failed = false;
        unlocked = false;
        lockNavigation();
      },
      markLoaded: function (key) {
        scriptStatus[key] = true;
        maybeUnlock();
      },
      markFailed: function (key, err) {
        failed = true;
        // Meaningful error; gate stays locked intentionally.
        console.error(
          '[KwikPass] Required script failed to load: "' + key +
          '". Account links remain disabled.', err
        );
      }
    };
  })();


  var KP_LOW_PRIORITY_SCRIPT_URL = "https://pdp.gokwik.co/jify/build/sdk.js";

  function generateKpRequestId(){
    return 'req-' + Date.now().toString(36) + '-' + Math.random().toString(36).slice(2);
  }

  function runWhenIdle(fn, timeout){
    if(typeof requestIdleCallback === 'function'){
      requestIdleCallback(fn, { timeout: timeout });
    }else{
      setTimeout(fn, 0);
    }
  }

  function isJifyScriptAlreadyPresent(){
    return !!document.querySelector('script[src*="/jify/"]');
  }

  function loadLowPriorityScript(src){
    runWhenIdle(function(){
      try{
        if(isJifyScriptAlreadyPresent()){
          return;
        }
        var script = document.createElement('script');
        script.src = src;
        script.type = 'module';
        script.async = true;
        script.setAttribute('fetchpriority', 'low');
        document.body.appendChild(script);
      }catch(err){
        console.error(err);
      }
    }, 5000);
  }

  function checkMerchantStatusAndLoadLowPriorityScript(merchantId){
    runWhenIdle(function(){
      try{
        if(!merchantId){
          return;
        }

        if(isJifyScriptAlreadyPresent()){
          return;
        }

        var kpRequestId = generateKpRequestId();
        var merchantStatusUrl = 'https://gkx.gokwik.co/jify/api/v1/merchant/status';

        fetch(merchantStatusUrl, {
          method: 'GET',
          priority: 'low',
          headers: {
            'gk-merchant-id': merchantId,
            'kp-merchant-id': merchantId,
            'kp-request-id': kpRequestId,
          },
        })
        .then(function(response){ return response.json(); })
        .then(function(data){
          if(data && data.enabled === true && KP_LOW_PRIORITY_SCRIPT_URL){
            loadLowPriorityScript(KP_LOW_PRIORITY_SCRIPT_URL);
          }
        })
        .catch(function(err){ console.error(err); });
      }catch(err){
        console.error(err);
      }
    }, 3000);
  }

  function addScripts(){
    var kwikpassCoreFnUrl="https://pdp.gokwik.co/kwikpass/kwikpass-core-functions-min.js"
    var kwikpassMerchantV2Url="https://pdp.gokwik.co/kwikpass/plugin/build/kp-merchant-v2.js";
    var kwikpassSDKUrl="https://pdp.gokwik.co/kwikpass/plugin/build/kp-shopify-app-sdk.js";

    // Start blocking account-link navigation before the scripts are appended.
    KwikpassAccountGate.init(['core', 'merchantV2', 'sdk']);

    var kpCoreFnScript = document.createElement('script');
    kpCoreFnScript.src = kwikpassCoreFnUrl;
    kpCoreFnScript.async=false;

    kpCoreFnScript.onload = () => {
      KwikpassAccountGate.markLoaded('core');
      if(document.querySelector(ICON_SELECT_QUERY)){
        addLoginButton();
      }else if(document.querySelector(HORIZON_PROFILE_ICON)){
        handleNewVersionsOfHorizon();
        addLoginButtonForHorizon();
        }else{
        handleManualIntegration();
      }
    };
    kpCoreFnScript.onerror = (e) => KwikpassAccountGate.markFailed('core', e);

    var kpMerchantV2Script = document.createElement('script');
    kpMerchantV2Script.src = kwikpassMerchantV2Url;
    kpMerchantV2Script.async=false;
    kpMerchantV2Script.onload = () => KwikpassAccountGate.markLoaded('merchantV2');
    kpMerchantV2Script.onerror = (e) => KwikpassAccountGate.markFailed('merchantV2', e);

    var kpMerchantV2SDKScript = document.createElement('script');
    kpMerchantV2SDKScript.src = kwikpassSDKUrl;
    kpMerchantV2SDKScript.async=false;
    kpMerchantV2SDKScript.onload = () => KwikpassAccountGate.markLoaded('sdk');
    kpMerchantV2SDKScript.onerror = (e) => KwikpassAccountGate.markFailed('sdk', e);

    // Appended together => the three scripts download in parallel
    // (async=false preserves execution order between them).
    document.body.appendChild(kpCoreFnScript);
    document.body.appendChild(kpMerchantV2Script);
    document.body.appendChild(kpMerchantV2SDKScript);
  }
